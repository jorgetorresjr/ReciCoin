<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Empresa - ReciCoin</title>
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
    <div class="container auth-container" style="max-width: 700px;">
        <div class="clean-card">
            <h2 class="text-center text-success">Seja uma Empresa Parceira</h2>
            <p class="text-center mb-3">Ofereça recompensas e ajude o meio ambiente.</p>
            
            <form id="companyForm">
                <div class="form-group">
                    <label class="form-label">Razão Social / Nome da Empresa</label>
                    <input type="text" id="legalName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">E-mail Comercial</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Telefone</label>
                    <input type="text" id="phone" class="form-control">
                </div>
                <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 15px;">Cadastrar Empresa</button>
            </form>
            <div class="mt-3 text-center"><a href="/login">Voltar para Login</a></div>
        </div>
    </div>
    <script>
        document.getElementById('companyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                legalName: document.getElementById('legalName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone: document.getElementById('phone').value,
                role: 'COMPANY'
            };
            const res = await fetch('/companies/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (res.ok) { alert('Empresa cadastrada!'); window.location.href = '/login'; } 
            else { alert('Erro ao cadastrar.'); }
        });
    </script>
</body>
</html>
